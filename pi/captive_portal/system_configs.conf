# =============================================================================
# heardhere.uk — system config files
# These are written by provision.sh to the correct system locations.
# Kept here for reference and reproducibility.
# =============================================================================

# ── /etc/hostapd/hostapd.conf ─────────────────────────────────────────────────
# WiFi access point config. SSID is overwritten at runtime by firstboot.sh
# using the unit's MAC address.
#
# interface=wlan0
# driver=nl80211
# ssid=heardhere_0000          ← overwritten at boot
# hw_mode=g
# channel=6
# wmm_enabled=0
# macaddr_acl=0
# auth_algs=1
# ignore_broadcast_ssid=0
# wpa=0                        ← open network, no password (setup only)
# country_code=GB

# ── /etc/dnsmasq-captive.conf ──────────────────────────────────────────────────
# Separate dnsmasq instance for the captive portal AP.
# Does NOT conflict with the system dnsmasq if present.
#
# interface=wlan0
# bind-interfaces
# dhcp-range=192.168.4.10,192.168.4.50,255.255.255.0,24h
# dhcp-option=3,192.168.4.1       ← default gateway = us
# dhcp-option=6,192.168.4.1       ← DNS = us (redirects all queries)
# address=/#/192.168.4.1          ← resolve ALL domains to us (captive portal trick)
# port=5353                       ← avoid conflict with system dnsmasq

# ── systemd services ───────────────────────────────────────────────────────────

# /etc/systemd/system/heardhere-boot.service
# Runs firstboot.sh at every boot — decides portal vs naturewarden
#
# [Unit]
# Description=heardhere first-boot / mode selector
# After=network.target
# Before=naturewarden.service
#
# [Service]
# Type=oneshot
# ExecStart=/home/pi/heardhere/pi/captive_portal/firstboot.sh
# RemainAfterExit=yes
#
# [Install]
# WantedBy=multi-user.target

# /etc/systemd/system/captive-portal.service
# Flask app serving the setup UI
#
# [Unit]
# Description=heardhere captive portal setup
# After=network.target
#
# [Service]
# Type=simple
# User=root
# ExecStart=/home/pi/venv/bin/python3 /home/pi/heardhere/pi/captive_portal/captive_portal.py
# Restart=on-failure
# StandardOutput=append:/home/pi/logs/captive_portal.log
# StandardError=append:/home/pi/logs/captive_portal.log
#
# [Install]
# WantedBy=multi-user.target

# /etc/systemd/system/dnsmasq-captive.service
# Separate dnsmasq for the AP (not the system one)
#
# [Unit]
# Description=dnsmasq for heardhere captive portal
# After=network.target
#
# [Service]
# Type=simple
# ExecStart=/usr/sbin/dnsmasq --no-daemon --conf-file=/etc/dnsmasq-captive.conf
# Restart=on-failure
#
# [Install]
# WantedBy=multi-user.target
